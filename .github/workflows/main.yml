on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - uses: pnpm/action-setup@v4
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: |
          if ! git diff -q; then
            echo '::error::Generated files are not up-to-date'
            exit 1
          fi
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - uses: ruby/setup-ruby@v1
      - uses: pnpm/action-setup@v4
      - run: pnpm install
      - run: pnpm test
